# cloudbuild.yaml — Pipeline para desplegar backend y frontend en Cloud Run
#
# Sustituciones configurables en el trigger de Cloud Build:
#   _REGION                  Región de GCP             (defecto: us-central1)
#   _PROJECT_ID              ID del proyecto GCP        (defecto: $PROJECT_ID built-in)
#   _BACKEND_SERVICE         Nombre del servicio CR     (defecto: backend)
#   _FRONTEND_SERVICE        Nombre del servicio CR     (defecto: frontend)
#   _BACKEND_IMAGE           Imagen Artifact Registry   (defecto: ver abajo)
#   _FRONTEND_IMAGE          Imagen Artifact Registry   (defecto: ver abajo)
#   _FRONTEND_PUBLIC_API_URL URL pública del backend    (OBLIGATORIO en segundo deploy)
#   _CORS_ORIGIN             URL pública del frontend   (OBLIGATORIO en segundo deploy)
#
# Valores por defecto apuntan a Artifact Registry en us-central1.
# Crea el repositorio Docker antes del primer deploy:
#   gcloud artifacts repositories create cloud-run-source-deploy \
#     --repository-format=docker --location=us-central1

substitutions:
  _REGION: us-central1
  _BACKEND_SERVICE: backend
  _FRONTEND_SERVICE: frontend
  _BACKEND_IMAGE: us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/backend
  _FRONTEND_IMAGE: us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/frontend
  _FRONTEND_PUBLIC_API_URL: https://backend-replace-me.run.app/api
  _CORS_ORIGIN: https://frontend-replace-me.run.app

steps:
  # ── Backend ────────────────────────────────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_BACKEND_IMAGE
      - ./backend

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_BACKEND_IMAGE
    waitFor:
      - build-backend

  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_BACKEND_SERVICE
      - --image=$_BACKEND_IMAGE
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --set-env-vars=CORS_ORIGIN=$_CORS_ORIGIN
    waitFor:
      - push-backend

  # ── Frontend ───────────────────────────────────────────────────────────────
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_FRONTEND_IMAGE
      - --build-arg
      - VITE_API_URL=$_FRONTEND_PUBLIC_API_URL
      - ./frontend

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_FRONTEND_IMAGE
    waitFor:
      - build-frontend

  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_FRONTEND_SERVICE
      - --image=$_FRONTEND_IMAGE
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
    waitFor:
      - push-frontend

images:
  - $_BACKEND_IMAGE
  - $_FRONTEND_IMAGE

options:
  logging: CLOUD_LOGGING_ONLY
